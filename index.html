<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0d9488">
  <title>جمعية قلوب الخير - مريرت</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi2KzZhdi52YrYqSDZgtmE2YjYqCDYp9mE2K7ZitixIiwic2hvcnRfbmFtZSI6ItmC2YTZiNioINin2YTYrtmK2LEiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2YwZmRmYSIsInRoZW1lX2NvbG9yIjoiIzBkOTQ4OCJ9">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --secondary: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --bg: #f0fdfa;
      --card: #ffffff;
      --text: #134e4a;
      --text-light: #5f9ea0;
      --border: #99f6e4;
      --shadow: 0 4px 20px rgba(13, 148, 136, 0.15);
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    
    .header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 0.85rem;
      opacity: 0.9;
    }
    
    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 10px;
      padding: 15px;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid var(--border);
    }
    
    .stat-card {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      text-align: center;
      min-width: 100px;
    }
    
    .stat-card.warning {
      background: linear-gradient(135deg, #fcd34d 0%, var(--secondary) 100%);
    }
    
    .stat-card .number {
      font-size: 1.8rem;
      font-weight: 800;
    }
    
    .stat-card .label {
      font-size: 0.75rem;
      opacity: 0.95;
    }
    
    /* Search */
    .search-container {
      padding: 15px;
      background: white;
    }
    
    .search-input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--bg);
      transition: all 0.3s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
    }
    
    /* Family List */
    .family-list {
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .family-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      border-right: 4px solid var(--primary);
      transition: transform 0.2s;
    }
    
    .family-card:active {
      transform: scale(0.98);
    }
    
    .family-card.widow {
      border-right-color: var(--secondary);
    }
    
    .family-card.divorced {
      border-right-color: var(--danger);
    }
    
    .family-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    
    .family-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    
    .family-badges {
      display: flex;
      gap: 6px;
    }
    
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    
    .badge.widow {
      background: #fef3c7;
      color: #92400e;
    }
    
    .badge.divorced {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .badge.children {
      background: #d1fae5;
      color: #065f46;
    }
    
    .family-info {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      color: var(--text-light);
    }
    
    .family-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:active {
      background: var(--primary-dark);
    }
    
    .btn-secondary {
      background: var(--bg);
      color: var(--primary);
      border: 2px solid var(--border);
    }
    
    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }
    
    .btn-warning {
      background: #fef3c7;
      color: #92400e;
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 20px 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      z-index: 100;
    }
    
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border: none;
      background: none;
      color: var(--text-light);
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s;
    }
    
    .nav-btn.active {
      color: var(--primary);
      background: var(--bg);
    }
    
    .nav-btn svg {
      width: 24px;
      height: 24px;
    }
    
    /* Form Page */
    .form-page {
      display: none;
      padding: 15px;
    }
    
    .form-page.active {
      display: block;
    }
    
    .form-section {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
    }
    
    .form-section h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--bg);
      transition: all 0.2s;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
    }
    
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .checkbox-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg);
      border-radius: 10px;
      cursor: pointer;
    }
    
    .checkbox-item input {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
    }
    
    /* Children Section */
    .child-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      position: relative;
    }
    
    .child-card .remove-child {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--danger);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .child-header {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
    }
    
    .add-child-btn {
      width: 100%;
      padding: 14px;
      border: 2px dashed var(--primary);
      border-radius: 12px;
      background: transparent;
      color: var(--primary);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    /* Export Page */
    .export-page {
      display: none;
      padding: 15px;
    }
    
    .export-page.active {
      display: block;
    }
    
    .export-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
    }
    
    .export-card h3 {
      font-size: 1.1rem;
      color: var(--primary);
      margin-bottom: 15px;
    }
    
    .export-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .export-btn {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-align: right;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .export-btn:active {
      background: var(--bg);
      border-color: var(--primary);
    }
    
    .export-btn .icon {
      width: 40px;
      height: 40px;
      background: var(--bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    
    .age-range {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 15px;
      padding: 15px;
      background: var(--bg);
      border-radius: 12px;
    }
    
    .age-range input {
      width: 70px;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      text-align: center;
    }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--border);
    }
    
    .modal-header h2 {
      font-size: 1.2rem;
      color: var(--primary);
    }
    
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Export Results */
    .export-results {
      margin-top: 15px;
    }
    
    .export-results table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    
    .export-results th,
    .export-results td {
      padding: 10px;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    
    .export-results th {
      background: var(--bg);
      font-weight: 700;
      color: var(--primary);
    }
    
    .export-results tr:nth-child(even) {
      background: var(--bg);
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    
    /* Floating Add Button */
    .fab {
      position: fixed;
      bottom: 90px;
      left: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      box-shadow: 0 4px 20px rgba(13, 148, 136, 0.4);
      font-size: 2rem;
      cursor: pointer;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .fab:active {
      transform: scale(0.95);
    }
    
    /* View Details */
    .detail-row {
      display: flex;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .detail-label {
      flex-shrink: 0;
      width: 120px;
      font-weight: 700;
      color: var(--primary);
      font-size: 0.85rem;
    }
    
    .detail-value {
      flex: 1;
      color: var(--text);
      font-size: 0.9rem;
    }
    
    .children-list {
      margin-top: 10px;
    }
    
    .child-detail {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }
    
    .child-detail strong {
      color: var(--primary);
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      z-index: 300;
      opacity: 0;
      transition: all 0.3s;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1>❤️ جمعية قلوب الخير</h1>
      <p>مريرت - الملف الاجتماعي للأسر</p>
    </header>
    
    <!-- Main Content -->
    <main id="mainContent">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="number" id="totalFamilies">0</div>
          <div class="label">إجمالي الأسر</div>
        </div>
        <div class="stat-card warning">
          <div class="number" id="totalWidows">0</div>
          <div class="label">الأرامل</div>
        </div>
        <div class="stat-card">
          <div class="number" id="totalChildren">0</div>
          <div class="label">الأبناء</div>
        </div>
      </div>
      
      <!-- Search -->
      <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 البحث عن أسرة...">
      </div>
      
      <!-- Family List -->
      <div class="family-list" id="familyList"></div>
    </main>
    
    <!-- Form Page -->
    <div class="form-page" id="formPage">
      <form id="familyForm">
        <!-- Responsible Member -->
        <div class="form-section">
          <h3>👤 العضو المسؤول</h3>
          <div class="form-group">
            <label>إسم العضو المسؤول</label>
            <input type="text" id="responsibleMember" placeholder="أدخل اسم العضو المسؤول">
          </div>
        </div>
        
        <!-- Parents -->
        <div class="form-section">
          <h3>👨‍👩‍👧‍👦 الأبوين</h3>
          
          <div class="form-group">
            <label>إسم الزوج</label>
            <input type="text" id="husbandName" placeholder="إسم الزوج">
          </div>
          <div class="form-group">
            <label>رقم البطاقة الوطنية (الزوج)</label>
            <input type="text" id="husbandCin" placeholder="رقم البطاقة">
          </div>
          <div class="form-group">
            <label>رقم الهاتف (الزوج)</label>
            <input type="tel" id="husbandPhone" placeholder="رقم الهاتف">
          </div>
          
          <hr style="margin: 20px 0; border: none; border-top: 2px dashed var(--border);">
          
          <div class="form-group">
            <label>إسم الزوجة</label>
            <input type="text" id="wifeName" placeholder="إسم الزوجة">
          </div>
          <div class="form-group">
            <label>رقم البطاقة الوطنية (الزوجة)</label>
            <input type="text" id="wifeCin" placeholder="رقم البطاقة">
          </div>
          <div class="form-group">
            <label>رقم الهاتف (الزوجة)</label>
            <input type="tel" id="wifePhone" placeholder="رقم الهاتف">
          </div>
          
          <div class="form-group">
            <label>الحالة الاجتماعية</label>
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="checkbox" id="isWidow">
                <span>أرملة</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="isDivorced">
                <span>مطلقة</span>
              </label>
            </div>
          </div>
        </div>
        
        <!-- Children -->
        <div class="form-section">
          <h3>👶 الأبناء</h3>
          <div id="childrenContainer"></div>
          <button type="button" class="add-child-btn" onclick="addChild()">
            <span>+</span> إضافة ابن/ابنة
          </button>
        </div>
        
        <!-- Health -->
        <div class="form-section">
          <h3>🏥 الظروف الصحية</h3>
          <div class="form-group">
            <label>الظروف المرضية لدى الأسرة</label>
            <textarea id="healthConditions" placeholder="اذكر أي ظروف مرضية..."></textarea>
          </div>
          <div class="form-group">
            <label>التغطية الصحية المتوفرة</label>
            <input type="text" id="healthCoverage" placeholder="مثال: راميد، CNSS...">
          </div>
        </div>
        
        <!-- Social -->
        <div class="form-section">
          <h3>🏠 الظروف الاجتماعية</h3>
          <div class="form-group">
            <label>السكن</label>
            <input type="text" id="housing" placeholder="نوع السكن والعنوان">
          </div>
          <div class="form-group">
            <label>الإعالة</label>
            <input type="text" id="support" placeholder="مصدر الدخل/الإعالة">
          </div>
        </div>
        
        <!-- Other Info -->
        <div class="form-section">
          <h3>📝 معلومات أخرى</h3>
          <div class="form-group">
            <textarea id="otherInfo" placeholder="أي معلومات إضافية عن الأسرة..."></textarea>
          </div>
        </div>
        
        <!-- Submit -->
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem; margin-bottom: 20px;">
          💾 حفظ الملف
        </button>
        
        <button type="button" class="btn btn-secondary" style="width: 100%; padding: 14px;" onclick="cancelForm()">
          إلغاء
        </button>
      </form>
    </div>
    
    <!-- Export Page -->
    <div class="export-page" id="exportPage">
      <div class="export-card">
        <h3>📤 تصدير البيانات</h3>
        <div class="export-options">
          <button class="export-btn" onclick="showExportModal('widows')">
            <div class="icon">👩</div>
            <div>
              <strong>قائمة الأرامل</strong>
              <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 4px;">تصدير جميع الأسر الأرامل</p>
            </div>
          </button>
          
          <button class="export-btn" onclick="showExportModal('divorced')">
            <div class="icon">📋</div>
            <div>
              <strong>قائمة المطلقات</strong>
              <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 4px;">تصدير جميع الأسر المطلقات</p>
            </div>
          </button>
          
          <button class="export-btn" onclick="showExportModal('children')">
            <div class="icon">👶</div>
            <div>
              <strong>الأبناء حسب العمر</strong>
              <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 4px;">تصدير الأبناء في فئة عمرية معينة</p>
            </div>
          </button>
          
          <button class="export-btn" onclick="showExportModal('all')">
            <div class="icon">📊</div>
            <div>
              <strong>جميع الأسر</strong>
              <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 4px;">تصدير قاعدة البيانات كاملة</p>
            </div>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="showPage('main')" id="navMain">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        </svg>
        الرئيسية
      </button>
      <button class="nav-btn" onclick="showPage('export')" id="navExport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        التصدير
      </button>
    </nav>
    
    <!-- FAB -->
    <button class="fab" onclick="openNewForm()">+</button>
    
    <!-- Export Modal -->
    <div class="modal-overlay" id="exportModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">تصدير</h2>
          <button class="modal-close" onclick="closeExportModal()">×</button>
        </div>
        <div id="modalContent"></div>
      </div>
    </div>
    
    <!-- View Modal -->
    <div class="modal-overlay" id="viewModal">
      <div class="modal">
        <div class="modal-header">
          <h2>تفاصيل الأسرة</h2>
          <button class="modal-close" onclick="closeViewModal()">×</button>
        </div>
        <div id="viewContent"></div>
      </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>
  
  <script>
    // Data Store
    let families = JSON.parse(localStorage.getItem('charityFamilies') || '[]');
    let editingId = null;
    let childCount = 0;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderFamilies();
      updateStats();
      
      document.getElementById('searchInput').addEventListener('input', (e) => {
        renderFamilies(e.target.value);
      });
      
      document.getElementById('familyForm').addEventListener('submit', saveFamily);
    });
    
    // Save Data
    function saveData() {
      localStorage.setItem('charityFamilies', JSON.stringify(families));
    }
    
    // Show Page
    function showPage(page) {
      document.getElementById('mainContent').style.display = page === 'main' ? 'block' : 'none';
      document.getElementById('formPage').classList.remove('active');
      document.getElementById('exportPage').classList.remove('active');
      
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      
      if (page === 'main') {
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('navMain').classList.add('active');
        document.querySelector('.fab').style.display = 'flex';
      } else if (page === 'export') {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('exportPage').classList.add('active');
        document.getElementById('navExport').classList.add('active');
        document.querySelector('.fab').style.display = 'none';
      } else if (page === 'form') {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('formPage').classList.add('active');
        document.querySelector('.fab').style.display = 'none';
      }
    }
    
    // Update Stats
    function updateStats() {
      document.getElementById('totalFamilies').textContent = families.length;
      document.getElementById('totalWidows').textContent = families.filter(f => f.isWidow).length;
      
      let totalChildren = 0;
      families.forEach(f => totalChildren += (f.children ? f.children.length : 0));
      document.getElementById('totalChildren').textContent = totalChildren;
    }
    
    // Render Families
    function renderFamilies(search = '') {
      const list = document.getElementById('familyList');
      let filtered = families;
      
      if (search) {
        const s = search.toLowerCase();
        filtered = families.filter(f => 
          (f.wife?.name || '').toLowerCase().includes(s) ||
          (f.husband?.name || '').toLowerCase().includes(s) ||
          (f.responsibleMember || '').toLowerCase().includes(s)
        );
      }
      
      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
            <h3>${search ? 'لا توجد نتائج' : 'لا توجد أسر مسجلة'}</h3>
            <p>${search ? 'جرب البحث بكلمات أخرى' : 'اضغط على + لإضافة أسرة جديدة'}</p>
          </div>
        `;
        return;
      }
      
      list.innerHTML = filtered.map(f => {
        const badges = [];
        if (f.isWidow) badges.push('<span class="badge widow">أرملة</span>');
        if (f.isDivorced) badges.push('<span class="badge divorced">مطلقة</span>');
        if (f.children?.length) badges.push(`<span class="badge children">${f.children.length} أبناء</span>`);
        
        const name = f.wife?.name || f.husband?.name || 'بدون إسم';
        const statusClass = f.isWidow ? 'widow' : (f.isDivorced ? 'divorced' : '');
        
        return `
          <div class="family-card ${statusClass}">
            <div class="family-header">
              <div class="family-name">${name}</div>
              <div class="family-badges">${badges.join('')}</div>
            </div>
            <div class="family-info">
              ${f.husband?.phone ? `<span>📞 ${f.husband.phone}</span>` : ''}
              ${f.wife?.phone ? `<span>📞 ${f.wife.phone}</span>` : ''}
            </div>
            <div class="family-actions">
              <button class="btn btn-secondary" onclick="viewFamily(${f.id})">👁️ عرض</button>
              <button class="btn btn-primary" onclick="editFamily(${f.id})">✏️ تعديل</button>
              <button class="btn btn-danger" onclick="deleteFamily(${f.id})">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Open New Form
    function openNewForm() {
      editingId = null;
      childCount = 0;
      document.getElementById('familyForm').reset();
      document.getElementById('childrenContainer').innerHTML = '';
      showPage('form');
    }
    
    // Add Child
    function addChild(data = null) {
      childCount++;
      const container = document.getElementById('childrenContainer');
      const childHtml = `
        <div class="child-card" id="child-${childCount}">
          <button type="button" class="remove-child" onclick="removeChild(${childCount})">×</button>
          <div class="child-header">الابن/الابنة ${childCount}</div>
          <div class="form-group">
            <label>الاسم</label>
            <input type="text" name="childName-${childCount}" value="${data?.name || ''}" placeholder="اسم الابن/الابنة">
          </div>
          <div class="form-group">
            <label>تاريخ الازدياد</label>
            <input type="date" name="childBirth-${childCount}" value="${data?.birthDate || ''}">
          </div>
          <div class="form-group">
            <label>المستوى الدراسي</label>
            <input type="text" name="childEducation-${childCount}" value="${data?.educationLevel || ''}" placeholder="مثال: السنة الثالثة ابتدائي">
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', childHtml);
    }
    
    // Remove Child
    function removeChild(index) {
      const child = document.getElementById(`child-${index}`);
      if (child) child.remove();
    }
    
    // Cancel Form
    function cancelForm() {
      showPage('main');
    }
    
    // Save Family
    function saveFamily(e) {
      e.preventDefault();
      
      // Collect children
      const children = [];
      document.querySelectorAll('.child-card').forEach((card, i) => {
        const idx = card.id.split('-')[1];
        const name = document.querySelector(`[name="childName-${idx}"]`)?.value;
        const birthDate = document.querySelector(`[name="childBirth-${idx}"]`)?.value;
        const educationLevel = document.querySelector(`[name="childEducation-${idx}"]`)?.value;
        if (name || birthDate || educationLevel) {
          children.push({ name, birthDate, educationLevel });
        }
      });
      
      const family = {
        id: editingId || Date.now(),
        responsibleMember: document.getElementById('responsibleMember').value,
        husband: {
          name: document.getElementById('husbandName').value,
          cin: document.getElementById('husbandCin').value,
          phone: document.getElementById('husbandPhone').value
        },
        wife: {
          name: document.getElementById('wifeName').value,
          cin: document.getElementById('wifeCin').value,
          phone: document.getElementById('wifePhone').value
        },
        isWidow: document.getElementById('isWidow').checked,
        isDivorced: document.getElementById('isDivorced').checked,
        children,
        healthConditions: document.getElementById('healthConditions').value,
        healthCoverage: document.getElementById('healthCoverage').value,
        housing: document.getElementById('housing').value,
        support: document.getElementById('support').value,
        otherInfo: document.getElementById('otherInfo').value,
        createdAt: editingId ? families.find(f => f.id === editingId)?.createdAt : new Date().toISOString()
      };
      
      if (editingId) {
        families = families.map(f => f.id === editingId ? family : f);
      } else {
        families.push(family);
      }
      
      saveData();
      updateStats();
      renderFamilies();
      showToast(editingId ? 'تم تحديث الملف بنجاح ✓' : 'تم حفظ الملف بنجاح ✓');
      showPage('main');
    }
    
    // Edit Family
    function editFamily(id) {
      const family = families.find(f => f.id === id);
      if (!family) return;
      
      editingId = id;
      childCount = 0;
      
      document.getElementById('responsibleMember').value = family.responsibleMember || '';
      document.getElementById('husbandName').value = family.husband?.name || '';
      document.getElementById('husbandCin').value = family.husband?.cin || '';
      document.getElementById('husbandPhone').value = family.husband?.phone || '';
      document.getElementById('wifeName').value = family.wife?.name || '';
      document.getElementById('wifeCin').value = family.wife?.cin || '';
      document.getElementById('wifePhone').value = family.wife?.phone || '';
      document.getElementById('isWidow').checked = family.isWidow || false;
      document.getElementById('isDivorced').checked = family.isDivorced || false;
      document.getElementById('healthConditions').value = family.healthConditions || '';
      document.getElementById('healthCoverage').value = family.healthCoverage || '';
      document.getElementById('housing').value = family.housing || '';
      document.getElementById('support').value = family.support || '';
      document.getElementById('otherInfo').value = family.otherInfo || '';
      
      document.getElementById('childrenContainer').innerHTML = '';
      if (family.children) {
        family.children.forEach(child => addChild(child));
      }
      
      showPage('form');
    }
    
    // Delete Family
    function deleteFamily(id) {
      if (confirm('هل أنت متأكد من حذف هذه الأسرة؟')) {
        families = families.filter(f => f.id !== id);
        saveData();
        updateStats();
        renderFamilies();
        showToast('تم حذف الأسرة ✓');
      }
    }
    
    // View Family
    function viewFamily(id) {
      const family = families.find(f => f.id === id);
      if (!family) return;
      
      const calculateAge = (birthDate) => {
        if (!birthDate) return '';
        const today = new Date();
        const birth = new Date(birthDate);
        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
        return age + ' سنة';
      };
      
      let html = `
        <div class="detail-row">
          <div class="detail-label">العضو المسؤول</div>
          <div class="detail-value">${family.responsibleMember || '-'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">الزوج</div>
          <div class="detail-value">${family.husband?.name || '-'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">الزوجة</div>
          <div class="detail-value">${family.wife?.name || '-'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">الحالة</div>
          <div class="detail-value">
            ${family.isWidow ? '<span class="badge widow">أرملة</span>' : ''}
            ${family.isDivorced ? '<span class="badge divorced">مطلقة</span>' : ''}
            ${!family.isWidow && !family.isDivorced ? 'عادية' : ''}
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-label">السكن</div>
          <div class="detail-value">${family.housing || '-'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">الإعالة</div>
          <div class="detail-value">${family.support || '-'}</div>
        </div>
      `;
      
      if (family.children?.length) {
        html += `<h3 style="margin: 20px 0 10px; color: var(--primary);">الأبناء (${family.children.length})</h3>`;
        html += '<div class="children-list">';
        family.children.forEach((child, i) => {
          html += `
            <div class="child-detail">
              <strong>${child.name || 'الابن ' + (i + 1)}</strong><br>
              تاريخ الازدياد: ${child.birthDate || '-'} ${child.birthDate ? '(' + calculateAge(child.birthDate) + ')' : ''}<br>
              المستوى: ${child.educationLevel || '-'}
            </div>
          `;
        });
        html += '</div>';
      }
      
      document.getElementById('viewContent').innerHTML = html;
      document.getElementById('viewModal').classList.add('active');
    }
    
    function closeViewModal() {
      document.getElementById('viewModal').classList.remove('active');
    }
    
    // Export Functions
    function showExportModal(type) {
      const modal = document.getElementById('exportModal');
      const title = document.getElementById('modalTitle');
      const content = document.getElementById('modalContent');
      
      if (type === 'widows') {
        title.textContent = 'قائمة الأرامل';
        const widows = families.filter(f => f.isWidow);
        content.innerHTML = generateExportTable(widows, 'widows');
      } else if (type === 'divorced') {
        title.textContent = 'قائمة المطلقات';
        const divorced = families.filter(f => f.isDivorced);
        content.innerHTML = generateExportTable(divorced, 'divorced');
      } else if (type === 'children') {
        title.textContent = 'الأبناء حسب العمر';
        content.innerHTML = `
          <div class="age-range">
            <span>من</span>
            <input type="number" id="ageMin" value="6" min="0" max="100">
            <span>إلى</span>
            <input type="number" id="ageMax" value="18" min="0" max="100">
            <span>سنة</span>
          </div>
          <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="filterChildren()">
            🔍 بحث
          </button>
          <div id="childrenResults"></div>
        `;
      } else if (type === 'all') {
        title.textContent = 'جميع الأسر';
        content.innerHTML = generateExportTable(families, 'all');
      }
      
      modal.classList.add('active');
    }
    
    function closeExportModal() {
      document.getElementById('exportModal').classList.remove('active');
    }
    
    function filterChildren() {
      const min = parseInt(document.getElementById('ageMin').value) || 0;
      const max = parseInt(document.getElementById('ageMax').value) || 100;
      
      const results = [];
      families.forEach(family => {
        (family.children || []).forEach(child => {
          if (child.birthDate) {
            const today = new Date();
            const birth = new Date(child.birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
            
            if (age >= min && age <= max) {
              results.push({
                childName: child.name,
                age,
                educationLevel: child.educationLevel,
                familyName: family.wife?.name || family.husband?.name,
                phone: family.wife?.phone || family.husband?.phone
              });
            }
          }
        });
      });
      
      let html = `<p style="margin: 15px 0; font-weight: 700;">النتائج: ${results.length} طفل</p>`;
      
      if (results.length > 0) {
        html += `
          <div class="export-results">
            <table>
              <thead>
                <tr>
                  <th>الإسم</th>
                  <th>العمر</th>
                  <th>المستوى</th>
                  <th>الأسرة</th>
                </tr>
              </thead>
              <tbody>
                ${results.map(r => `
                  <tr>
                    <td>${r.childName || '-'}</td>
                    <td>${r.age} سنة</td>
                    <td>${r.educationLevel || '-'}</td>
                    <td>${r.familyName || '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="downloadCSV('children', ${JSON.stringify(results).replace(/"/g, '&quot;')})">
            📥 تحميل CSV
          </button>
        `;
      }
      
      document.getElementById('childrenResults').innerHTML = html;
    }
    
    function generateExportTable(data, type) {
      if (data.length === 0) {
        return '<p style="text-align: center; color: var(--text-light); padding: 40px;">لا توجد بيانات</p>';
      }
      
      let html = `<p style="margin-bottom: 15px; font-weight: 700;">النتائج: ${data.length}</p>`;
      html += `
        <div class="export-results">
          <table>
            <thead>
              <tr>
                <th>الإسم</th>
                <th>الهاتف</th>
                <th>عدد الأبناء</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(f => `
                <tr>
                  <td>${f.wife?.name || f.husband?.name || '-'}</td>
                  <td>${f.wife?.phone || f.husband?.phone || '-'}</td>
                  <td>${f.children?.length || 0}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="downloadCSV('${type}')">
          📥 تحميل CSV
        </button>
      `;
      return html;
    }
    
    function downloadCSV(type, childrenData = null) {
      let csv = '';
      let filename = '';
      
      if (type === 'children' && childrenData) {
        csv = 'الإسم,العمر,المستوى الدراسي,الأسرة,الهاتف\n';
        childrenData.forEach(r => {
          csv += `${r.childName || ''},${r.age},${r.educationLevel || ''},${r.familyName || ''},${r.phone || ''}\n`;
        });
        filename = 'children_export.csv';
      } else {
        let data = families;
        if (type === 'widows') data = families.filter(f => f.isWidow);
        if (type === 'divorced') data = families.filter(f => f.isDivorced);
        
        csv = 'الإسم,رقم الهاتف,رقم البطاقة,أرملة,مطلقة,عدد الأبناء,السكن,الإعالة\n';
        data.forEach(f => {
          const name = f.wife?.name || f.husband?.name || '';
          const phone = f.wife?.phone || f.husband?.phone || '';
          const cin = f.wife?.cin || f.husband?.cin || '';
          csv += `${name},${phone},${cin},${f.isWidow ? 'نعم' : 'لا'},${f.isDivorced ? 'نعم' : 'لا'},${f.children?.length || 0},${f.housing || ''},${f.support || ''}\n`;
        });
        filename = type + '_export.csv';
      }
      
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      showToast('تم تحميل الملف ✓');
    }
    
    // Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Close modals on overlay click
    document.getElementById('exportModal').addEventListener('click', (e) => {
      if (e.target.id === 'exportModal') closeExportModal();
    });
    document.getElementById('viewModal').addEventListener('click', (e) => {
      if (e.target.id === 'viewModal') closeViewModal();
    });
  </script>
</body>
</html>
